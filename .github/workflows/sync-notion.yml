# ================================================
# NOTION SYNC WORKFLOW
# ================================================
# Fetches content from Notion databases and generates
# JSON + cover images for the static site and harbour.
#
# Triggers:
# - Manual: Click "Run workflow" in GitHub Actions
# - Push: Any push to main branch
# - Schedule: Daily at 6 AM UTC
#
# Required secret:
# - NOTION_TOKEN: Your Notion integration token
#
# Output goes to site/data/, site/images/, harbour/data/,
# and harbour/public/images/.
# ================================================

name: Sync Notion Content

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/sync-notion.yml'
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Fetch Notion content
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/fetch-notion.js

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add site/data/ site/images/vertigo-vault/ harbour/data/ harbour/public/images/

          # Exit early if nothing changed
          if git diff --staged --quiet; then
            echo "No content changes — skipping commit"
            exit 0
          fi

          git commit -m "chore: sync Notion content and vault covers [skip ci]"

          # Discard incidental unstaged changes (e.g. package-lock.json
          # drifts from npm install) so rebase can proceed cleanly.
          git checkout -- .

          git pull --rebase origin main
          git push
