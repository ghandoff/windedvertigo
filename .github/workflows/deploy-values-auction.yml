name: deploy values-auction

# triggers:
#   - push to main that changes values-auction source OR this workflow itself
#       → runs install + build only (verification, not deploy)
#   - manual run via "Run workflow" button (workflow_dispatch)
#       → runs install + build + deploy + smoke check
#
# why split: the CLOUDFLARE_API_TOKEN secret has been stale since 2026-05.
# automated deploy on every merge would fail at the auth step and produce
# misleading red checks. while we keep the token unrotated, deploys happen
# locally via `npm run deploy:spa` from apps/harbour/values-auction/.
#
# secrets needed for workflow_dispatch path:
#   CLOUDFLARE_API_TOKEN — wrangler auth (same token in ~/.cf-token locally)
#
# account id is public (referenced in every wrangler.jsonc in the monorepo)
# so it's hardcoded here rather than treated as a secret.

on:
  push:
    branches: [main]
    paths:
      - "apps/harbour/values-auction/**"
      - ".github/workflows/deploy-values-auction.yml"
  workflow_dispatch:

concurrency:
  group: deploy-values-auction
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "097c92553b268f8360b74f625f6d980a"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install (workspace root)
        run: npm ci --no-audit --no-fund

      - name: build
        working-directory: apps/harbour/values-auction
        run: npm run build

      - name: deploy to cloudflare pages
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/harbour/values-auction
        run: npx wrangler@latest pages deploy dist --project-name=values-auction --branch=main --commit-dirty=true

      - name: smoke check
        if: github.event_name == 'workflow_dispatch'
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/body -w "%{http_code}" https://values-auction-d9m.pages.dev/)
            echo "attempt ${i}: HTTP ${code}"
            if [ "$code" = "200" ]; then
              if grep -q "wv-cadet\|--wv-seafoam\|data-surface" /tmp/body 2>/dev/null; then
                echo "✓ new palette tokens present in served HTML"
                exit 0
              fi
            fi
            sleep 10
          done
          echo "::warning::deploy succeeded but smoke didn't confirm new build within 65s — could be CDN propagation"
