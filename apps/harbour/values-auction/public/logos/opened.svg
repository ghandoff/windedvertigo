<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" aria-label="OpenEd logo">
  <circle cx="120" cy="120" r="112" fill="#f5ede4"/>
  <!-- yellow person circle above book spine -->
  <circle cx="120" cy="68" r="12" fill="#f5c430"/>
  <!-- open book: two pages spread open, spine at center bottom -->
  <!-- left page -->
  <path d="M120 92 L62 104 L62 162 L120 154 Z" fill="none" stroke="#1d2d44" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- right page -->
  <path d="M120 92 L178 104 L178 162 L120 154 Z" fill="none" stroke="#1d2d44" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- spine line -->
  <line x1="120" y1="92" x2="120" y2="154" stroke="#1d2d44" stroke-width="3.5" stroke-linecap="round"/>
  <!-- text lines on left page -->
  <line x1="72"  y1="118" x2="110" y2="114" stroke="#1d2d44" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="72"  y1="128" x2="110" y2="124" stroke="#1d2d44" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="72"  y1="138" x2="110" y2="135" stroke="#1d2d44" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- text lines on right page -->
  <line x1="130" y1="114" x2="168" y2="118" stroke="#1d2d44" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="130" y1="124" x2="168" y2="128" stroke="#1d2d44" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="130" y1="135" x2="168" y2="138" stroke="#1d2d44" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- OpenEd text -->
  <text x="120" y="185" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="26" fill="#1d2d44">OpenEd</text>
  <text x="120" y="202" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#1d2d44" opacity="0.7">Equity in digital education</text>
</svg>
