<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" aria-label="CoAct logo">
  <circle cx="120" cy="120" r="112" fill="#f5ede4"/>
  <!-- circular arrows icon: two C-arcs forming a cycle -->
  <!-- navy arc: bottom-left going clockwise (6 o'clock → 12 o'clock via left) -->
  <path d="M78 122 A34 34 0 1 1 112 88" fill="none" stroke="#1d2d44" stroke-width="8" stroke-linecap="round"/>
  <!-- navy arrowhead pointing up-right -->
  <polygon points="112,88 100,76 124,78" fill="#1d2d44"/>
  <!-- green arc: top-right going clockwise (12 o'clock → 6 o'clock via right) -->
  <path d="M128 88 A34 34 0 1 1 94 122" fill="none" stroke="#3aaa3a" stroke-width="8" stroke-linecap="round"/>
  <!-- green arrowhead pointing down-left -->
  <polygon points="94,122 106,134 82,132" fill="#3aaa3a"/>
  <!-- CoAct text -->
  <text x="120" y="186" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="28" fill="#1d2d44">CoAct</text>
  <text x="120" y="203" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#3aaa3a" letter-spacing="0.5">Collaborating for Impact</text>
</svg>
