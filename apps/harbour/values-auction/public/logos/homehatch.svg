<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" aria-label="HomeHatch logo">
  <circle cx="120" cy="120" r="112" fill="#f2c4a4"/>
  <!-- house body (coral/orange rectangle) -->
  <rect x="76" y="118" width="88" height="62" fill="#e05a3a"/>
  <!-- roof (dark navy triangle) -->
  <polygon points="64,120 120,62 176,120" fill="#1d2d44"/>
  <!-- window (darker square on body) -->
  <rect x="86" y="126" width="26" height="22" rx="2" fill="#c04830"/>
  <!-- door -->
  <rect x="106" y="146" width="22" height="34" rx="2" fill="#1d2d44"/>
  <!-- chimney -->
  <rect x="138" y="74" width="14" height="28" fill="#1d2d44"/>
  <!-- HomeHatch text -->
  <text x="120" y="202" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="22" fill="#1d2d44">HomeHatch</text>
</svg>
