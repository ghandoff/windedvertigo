<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" aria-label="Ripple logo">
  <rect width="240" height="240" rx="24" fill="#273248"/>
  <!-- concentric ripple waves — fintech inclusion -->
  <circle cx="120" cy="104" r="16" fill="#5f9ea0"/>
  <circle cx="120" cy="104" r="34" fill="none" stroke="#5f9ea0" stroke-width="5" opacity="0.75"/>
  <circle cx="120" cy="104" r="54" fill="none" stroke="#5f9ea0" stroke-width="4" opacity="0.5"/>
  <circle cx="120" cy="104" r="74" fill="none" stroke="#5f9ea0" stroke-width="3" opacity="0.3"/>
  <!-- coin / currency hint in center -->
  <text x="120" y="110" text-anchor="middle" font-family="'Atkinson Hyperlegible', Inter, system-ui, sans-serif" font-weight="700" font-size="16" fill="#273248">$</text>
  <!-- wave cut at bottom suggesting water / migration -->
  <path d="M40 168 Q65 156 90 168 T140 168 T190 168 T240 168 L240 240 L0 240 Z" fill="#5f9ea0" opacity="0.18"/>
  <text x="120" y="210" text-anchor="middle" font-family="'Atkinson Hyperlegible', Inter, system-ui, sans-serif" font-weight="700" font-size="22" letter-spacing="3" fill="#ffebd2">Ripple</text>
</svg>
