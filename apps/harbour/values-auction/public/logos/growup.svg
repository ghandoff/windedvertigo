<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" aria-label="GrowUp logo">
  <rect width="240" height="240" rx="24" fill="#273248"/>
  <!-- regenerative farming: plant growing from layered soil -->
  <!-- soil layers -->
  <rect x="40" y="152" width="160" height="18" rx="4" fill="#cb7858" opacity="0.6"/>
  <rect x="40" y="168" width="160" height="16" rx="4" fill="#b15043" opacity="0.7"/>
  <!-- stem -->
  <path d="M120 152 L120 88" stroke="#5f9ea0" stroke-width="7" stroke-linecap="round"/>
  <!-- leaves -->
  <path d="M120 120 C104 108 80 112 72 100 C88 88 112 96 120 108" fill="#5f9ea0" opacity="0.9"/>
  <path d="M120 104 C136 92 160 96 168 84 C152 72 128 80 120 92" fill="#5f9ea0"/>
  <!-- seed/sprout top -->
  <circle cx="120" cy="82" r="10" fill="#ffebd2"/>
  <path d="M120 72 L120 60" stroke="#ffebd2" stroke-width="4" stroke-linecap="round"/>
  <text x="120" y="210" text-anchor="middle" font-family="'Atkinson Hyperlegible', Inter, system-ui, sans-serif" font-weight="700" font-size="22" letter-spacing="2" fill="#ffebd2">GrowUp</text>
</svg>
