<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" aria-label="Blue Circuits logo">
  <circle cx="120" cy="120" r="112" fill="#f0f0ee"/>
  <!-- circuit dial icon: outer circle + diagonal line + nodes -->
  <circle cx="78" cy="112" r="34" fill="none" stroke="#1e6fa4" stroke-width="3.5"/>
  <!-- diagonal line from lower-left to upper-right inside circle -->
  <line x1="58" y1="130" x2="100" y2="90" stroke="#1e6fa4" stroke-width="3.5" stroke-linecap="round"/>
  <!-- node at upper-right end -->
  <circle cx="100" cy="90" r="5.5" fill="#1e6fa4"/>
  <!-- node at center -->
  <circle cx="78" cy="112" r="5.5" fill="#1e6fa4"/>
  <!-- small tick marks on arc (speedometer style) -->
  <line x1="78" y1="78"  x2="78" y2="85"  stroke="#1e6fa4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="108" y1="84" x2="104" y2="90" stroke="#1e6fa4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="112" x2="105" y2="112" stroke="#1e6fa4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- "Blue Circuits" text to the right -->
  <text x="124" y="106" font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="26" fill="#1d2d44">Blue</text>
  <text x="124" y="132" font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="26" fill="#1d2d44">Circuits</text>
</svg>
