<?xml version="1.0" encoding="UTF-8"?>
<!--
  CORONA SPLASH REFERENCE — Edgerton "Milk Drop Coronet" phenomenon.

  Anatomy (bottom to top):
    1. Background + pool surface with ripple rings
    2. Crater depression (darker ellipse where the impact hollowed the liquid)
    3. Back crown wall (drawn first, partially hidden behind the front)
    4. Central jet (slender vertical column rising from crater centre)
    5. Front crown wall — SINGLE <path> with modulated top edge:
         wavy rim where peaks = ligaments (rising fingers with tip bulbs)
         and troughs = valleys (still wall, just shorter)
    6. Rim highlight — second path tracing the top edge, rope-thick
    7. Secondary droplets with satellite trails

  Geometry reference:
    rim ellipse:       centre (400, 340), rx=240, ry=60  (3/4 perspective tilt)
    crater ellipse:    centre (400, 560), rx=130, ry=25
    ligament height:   ~100 px (rim to tip)
    ligament widths:   base ~28 px, waist ~12 px, bulb diameter ~24 px
    7 front-visible ligaments at θ = 180°, 150°, 120°, 90°, 60°, 30°, 0°
    6 valleys between them at 50% of ligament height above the rim.

  Tunable parameters (see end of file for where to edit):
    NUM_LIGAMENTS, FLARE_ANGLE, RIM_THICKNESS, LIGAMENT_HEIGHT_RATIO
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800"
     preserveAspectRatio="xMidYMid meet" aria-label="corona splash reference illustration">

  <!-- ═══ GRADIENTS + FILTERS ═══ -->
  <defs>
    <!-- Main wall gradient: lighter at top rim (backlit), darker toward base -->
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e8f4fc"/>
      <stop offset="22%" stop-color="#b8d9ec"/>
      <stop offset="55%" stop-color="#6b98b4"/>
      <stop offset="85%" stop-color="#3c6884"/>
      <stop offset="100%" stop-color="#25485f"/>
    </linearGradient>

    <!-- Back wall — slightly darker + more translucent (atmospheric perspective) -->
    <linearGradient id="wallBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#cfe3f0"/>
      <stop offset="60%" stop-color="#567e99"/>
      <stop offset="100%" stop-color="#2e506c"/>
    </linearGradient>

    <!-- Rope-rim gradient: bright top edge of the crown -->
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6fbfd"/>
      <stop offset="100%" stop-color="#a7cde1"/>
    </linearGradient>

    <!-- Droplet gradient: backlit sphere with upper-left specular -->
    <radialGradient id="drop" cx="0.32" cy="0.30" r="0.75">
      <stop offset="0%"  stop-color="#f3f9fc"/>
      <stop offset="45%" stop-color="#a0c4d8"/>
      <stop offset="85%" stop-color="#507a95"/>
      <stop offset="100%" stop-color="#2a4a65"/>
    </radialGradient>

    <!-- Crater depression — darker hollow -->
    <radialGradient id="crater" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"  stop-color="#0b1f32"/>
      <stop offset="55%" stop-color="#1b3852"/>
      <stop offset="100%" stop-color="#3a5f7c"/>
    </radialGradient>

    <!-- subtle blur for ripple rings only -->
    <filter id="soften" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="800" height="800" fill="#0a1826"/>

  <!-- ═══ POOL SURFACE ═══
       a dark horizontal band where the liquid lives. slightly lighter
       above, darker below, to suggest the surface is reflective.       -->
  <ellipse cx="400" cy="560" rx="400" ry="26" fill="#1b3550"/>
  <ellipse cx="400" cy="557" rx="400" ry="16" fill="#274969"/>

  <!-- ═══ RIPPLE RINGS ═══
       thin concentric ellipses radiating outward from the impact.      -->
  <ellipse cx="400" cy="562" rx="300" ry="24" fill="none"
           stroke="#5a8099" stroke-width="1.4" opacity="0.5"
           filter="url(#soften)"/>
  <ellipse cx="400" cy="561" rx="210" ry="19" fill="none"
           stroke="#688fa8" stroke-width="1.3" opacity="0.55"
           filter="url(#soften)"/>
  <ellipse cx="400" cy="560" rx="155" ry="15" fill="none"
           stroke="#7ea0b6" stroke-width="1.1" opacity="0.6"
           filter="url(#soften)"/>

  <!-- ═══ CRATER DEPRESSION ═══
       the impact hollowed a shallow bowl. seen as a dark ellipse, with
       a thin lighter rim outlining where the crater meets the surface. -->
  <ellipse cx="400" cy="572" rx="130" ry="26" fill="url(#crater)"/>
  <ellipse cx="400" cy="562" rx="132" ry="24" fill="none"
           stroke="#7ea6bf" stroke-width="1.6" opacity="0.85"/>

  <!-- ═══ BACK CROWN WALL ═══
       drawn FIRST, occluded by the front wall except where back-ligament
       tips rise above the front rim. the back half of the ring has its
       own ligaments; 5 of them poke up visibly. simplified as discrete
       back-finger paths rather than a full second wall.               -->
  <g id="back-ligaments" opacity="0.88">
    <!-- back-left ligament (θ ≈ 225°) -->
    <path d="M 220 265
             C 214 245, 222 208, 228 195
             C 232 188, 236 188, 236 198
             C 240 212, 244 245, 240 265 Z"
          fill="url(#wallBack)" stroke="#3a6684" stroke-width="1.2"/>
    <!-- back-inner-left ligament (θ ≈ 255°) -->
    <path d="M 330 252
             C 326 228, 332 190, 338 176
             C 342 170, 346 170, 346 180
             C 350 194, 354 228, 348 252 Z"
          fill="url(#wallBack)" stroke="#3a6684" stroke-width="1.2"/>
    <!-- back-centre ligament (θ ≈ 270°) -->
    <path d="M 391 248
             C 388 222, 396 180, 400 162
             C 404 180, 412 222, 409 248 Z"
          fill="url(#wallBack)" stroke="#3a6684" stroke-width="1.2"/>
    <!-- back-inner-right ligament (θ ≈ 285°) -->
    <path d="M 452 252
             C 446 228, 454 190, 462 176
             C 466 170, 470 170, 470 180
             C 476 194, 482 228, 476 252 Z"
          fill="url(#wallBack)" stroke="#3a6684" stroke-width="1.2"/>
    <!-- back-right ligament (θ ≈ 315°) -->
    <path d="M 562 265
             C 556 245, 564 208, 570 195
             C 574 188, 578 188, 578 198
             C 582 212, 586 245, 580 265 Z"
          fill="url(#wallBack)" stroke="#3a6684" stroke-width="1.2"/>
  </g>

  <!-- Tip bulbs on back ligaments (brighter spheres atop) -->
  <circle cx="232" cy="194" r="6" fill="url(#drop)"/>
  <circle cx="342" cy="176" r="7" fill="url(#drop)"/>
  <circle cx="400" cy="162" r="8" fill="url(#drop)"/>
  <circle cx="466" cy="176" r="7" fill="url(#drop)"/>
  <circle cx="574" cy="194" r="6" fill="url(#drop)"/>

  <!-- ═══ CENTRAL JET ═══
       slender vertical column rising from the crater centre. narrower
       than the crown ligaments, taller than them, topped with its own
       spherical droplet about to detach (the "Rayleigh jet").           -->
  <path d="M 393 570
           C 388 500, 390 380, 395 220
           C 397 200, 399 185, 400 178
           C 401 185, 403 200, 405 220
           C 410 380, 412 500, 407 570 Z"
        fill="url(#wall)" stroke="#3d6a88" stroke-width="1.3"/>
  <!-- jet highlight -->
  <path d="M 397 210 C 396 340, 396 460, 398 560"
        fill="none" stroke="#d8ecf6" stroke-width="1.2" opacity="0.75"/>
  <!-- jet tip droplet + specular -->
  <circle cx="400" cy="168" r="14" fill="url(#drop)"
          stroke="#3d6a88" stroke-width="0.8"/>
  <circle cx="396" cy="163" r="3.2" fill="#ffffff" opacity="0.92"/>

  <!-- ═══ FRONT CROWN WALL ═══
       SINGLE <path> tracing:
         • left wall flare (concave tulip curve, base→rim)
         • wavy top edge (7 ligaments + 6 valleys, all Beziers)
         • right wall flare (mirror, rim→base)
         • crater front arc (closes path along the crater rim)
       no L segments anywhere — liquid surfaces are always curved.    -->
  <path id="front-wall"
        d="M 275 560
           C 258 478, 148 390, 145 340
           C 135 308, 140 270, 148 250
           C 142 222, 178 222, 172 250
           C 180 270, 185 308, 175 340
           Q 168 256, 181 370
           C 176 340, 186 305, 184 286
           C 180 260, 210 260, 206 286
           C 204 305, 214 340, 209 370
           Q 232 280, 266 392
           C 260 360, 270 325, 268 306
           C 264 282, 296 282, 292 306
           C 290 325, 300 360, 294 392
           Q 338 296, 386 400
           C 380 368, 390 335, 388 316
           C 384 292, 416 292, 412 316
           C 410 335, 420 368, 414 400
           Q 462 296, 506 392
           C 500 360, 510 325, 508 306
           C 504 282, 536 282, 532 306
           C 530 325, 540 360, 534 392
           Q 570 280, 591 370
           C 586 340, 596 305, 594 286
           C 590 260, 620 260, 616 286
           C 614 305, 624 340, 619 370
           Q 632 256, 625 340
           C 620 308, 625 270, 628 250
           C 622 222, 658 222, 652 250
           C 660 270, 665 308, 655 340
           C 652 390, 542 478, 525 560
           C 480 590, 320 590, 275 560 Z"
        fill="url(#wall)"
        stroke="#3d6a88" stroke-width="2"
        stroke-linejoin="round"/>

  <!-- ═══ WALL INNER HIGHLIGHT ═══
       a subtle vertical gradient streak on the front-centre of the wall
       suggesting curvature/volume (not at the rim, but the belly).    -->
  <path d="M 400 520 C 396 440, 398 370, 400 340"
        fill="none" stroke="#d0e5f2" stroke-width="3"
        stroke-linecap="round" opacity="0.38"/>

  <!-- ═══ RIM HIGHLIGHT (rope-thick) ═══
       a second path tracing just the wavy top edge of the front wall.
       drawn with a thick stroke in the rim-gradient color to suggest
       the surface-tension roll-up at the top of the crown.             -->
  <path id="rim-rope"
        d="M 148 250
           C 142 222, 178 222, 172 250
           Q 168 256, 181 370
           C 176 340, 186 305, 184 286
           C 180 260, 210 260, 206 286
           Q 232 280, 266 392
           C 260 360, 270 325, 268 306
           C 264 282, 296 282, 292 306
           Q 338 296, 386 400
           C 380 368, 390 335, 388 316
           C 384 292, 416 292, 412 316
           Q 462 296, 506 392
           C 500 360, 510 325, 508 306
           C 504 282, 536 282, 532 306
           Q 570 280, 591 370
           C 586 340, 596 305, 594 286
           C 590 260, 620 260, 616 286
           Q 632 256, 625 340
           C 620 308, 625 270, 628 250
           C 622 222, 658 222, 652 250"
        fill="none"
        stroke="url(#rimGrad)" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.9"/>

  <!-- Specular dots on each front ligament bulb (wet reflective surface) -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="157" cy="233" r="2.6"/>
    <circle cx="190" cy="269" r="2.2"/>
    <circle cx="276" cy="289" r="2.2"/>
    <circle cx="396" cy="298" r="2.4"/>
    <circle cx="516" cy="289" r="2.2"/>
    <circle cx="602" cy="269" r="2.2"/>
    <circle cx="637" cy="233" r="2.6"/>
  </g>

  <!-- ═══ SECONDARY DROPLETS + SATELLITE TRAILS ═══
       small spheres detached above ligament tips. each has a tiny
       white specular dot (upper-left). trails of smaller satellites
       decrease in size as they rise further from the parent ligament. -->

  <!-- above jet tip (~400, 168): already has jet droplet, add a higher detached one -->
  <circle cx="400" cy="125" r="10" fill="url(#drop)" stroke="#3d6a88" stroke-width="0.6"/>
  <circle cx="397" cy="121" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="400" cy="100" r="5" fill="url(#drop)"/>
  <circle cx="400" cy="85" r="2.6" fill="url(#drop)"/>

  <!-- above leftmost front ligament tip (~160, 240) -->
  <circle cx="160" cy="198" r="11" fill="url(#drop)" stroke="#3d6a88" stroke-width="0.6"/>
  <circle cx="157" cy="194" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="160" cy="172" r="5" fill="url(#drop)"/>
  <circle cx="160" cy="157" r="2.5" fill="url(#drop)"/>

  <!-- above rightmost front ligament tip (~640, 240) -->
  <circle cx="640" cy="198" r="11" fill="url(#drop)" stroke="#3d6a88" stroke-width="0.6"/>
  <circle cx="637" cy="194" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="640" cy="172" r="5" fill="url(#drop)"/>
  <circle cx="640" cy="157" r="2.5" fill="url(#drop)"/>

  <!-- above front-left ligament tip (~195, 275) — smaller trail -->
  <circle cx="195" cy="240" r="7.5" fill="url(#drop)" stroke="#3d6a88" stroke-width="0.5"/>
  <circle cx="193" cy="237" r="2" fill="#ffffff" opacity="0.88"/>
  <circle cx="195" cy="220" r="3.5" fill="url(#drop)"/>

  <!-- above front-right ligament tip (~605, 275) -->
  <circle cx="605" cy="240" r="7.5" fill="url(#drop)" stroke="#3d6a88" stroke-width="0.5"/>
  <circle cx="603" cy="237" r="2" fill="#ffffff" opacity="0.88"/>
  <circle cx="605" cy="220" r="3.5" fill="url(#drop)"/>

</svg>
