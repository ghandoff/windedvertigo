<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f2a2e">
  <title>raft.house — bubble cluster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f2a2e;
      --surface: #162f34;
      --surface-2: #1e3a40;
      --cyan: #22d3ee;
      --text: #e2f8fc;
      --text-dim: rgba(226, 248, 252, 0.5);
      --sheet-bg: #0d2227;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 40%, rgba(34, 211, 238, 0.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 75% 65%, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transform-origin: center;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      will-change: transform, left, top;
      backface-visibility: hidden;
    }

    .bubble .label {
      font-size: 9px;
      font-weight: 600;
      color: white;
      text-align: center;
      line-height: 1.2;
      padding: 0 6px;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    .bubble.dragging {
      transform: scale(1.15) !important;
      z-index: 1000 !important;
      transition: none;
    }

    .bubble.selected {
      transform: scale(1.08);
    }

    .bubble.highlighted {
      animation: pulse-ring 0.4s ease-out forwards;
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); }
      70%  { transform: scale(0.95); }
      100% { transform: scale(1.08); }
    }

    @keyframes bubble-glow {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.25); }
    }

    .bubble.spawn-in {
      animation: spawn-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes spawn-in {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* bottom sheet */
    #sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--sheet-bg);
      border-top: 1px solid rgba(34, 211, 238, 0.15);
      border-radius: 20px 20px 0 0;
      padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
      max-height: 40vh;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 2000;
      overflow-y: auto;
    }

    #sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(34, 211, 238, 0.3);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .sheet-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    #sheet-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.1;
    }

    #sheet-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #sheet-close:hover {
      background: rgba(255,255,255,0.14);
    }

    #sheet-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: lowercase;
      margin-bottom: 12px;
    }

    #sheet-desc {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    #sheet-play {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--cyan);
      color: #0f2a2e;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    #sheet-play:hover { background: #67e8f9; transform: translateY(-1px); }
    #sheet-play:active { transform: translateY(0); }

    /* ui chrome */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 500;
    }

    #branding {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: 16px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(226, 248, 252, 0.7);
    }

    #hint {
      position: absolute;
      bottom: calc(max(20px, env(safe-area-inset-bottom)) + 20px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 500;
      color: rgba(226, 248, 252, 0.35);
      letter-spacing: 0.12em;
      white-space: nowrap;
      transition: opacity 0.8s ease;
    }

    #hint.hidden { opacity: 0; }

    #legend-toggle {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      right: 16px;
      pointer-events: all;
      background: rgba(226, 248, 252, 0.07);
      border: 1px solid rgba(226, 248, 252, 0.12);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(226, 248, 252, 0.5);
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.15s, color 0.15s;
    }

    #legend-toggle:hover {
      background: rgba(226, 248, 252, 0.12);
      color: rgba(226, 248, 252, 0.8);
    }

    #legend {
      position: absolute;
      top: max(44px, env(safe-area-inset-top) + 28px);
      right: 16px;
      background: rgba(13, 34, 39, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(34, 211, 238, 0.12);
      border-radius: 12px;
      padding: 12px 14px;
      pointer-events: all;
      display: none;
      min-width: 160px;
    }

    #legend.visible { display: block; }

    .legend-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(226, 248, 252, 0.6);
    }

    /* specular highlight on each bubble */
    .bubble::after {
      content: '';
      position: absolute;
      top: 15%;
      left: 20%;
      width: 30%;
      height: 20%;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      filter: blur(4px);
      pointer-events: none;
    }

    #zoom-wrap {
      position: absolute;
      inset: 0;
      transform-origin: center center;
    }

    #backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1500;
    }

    #backdrop.active { display: block; }
  </style>
</head>
<body>

<div id="scene">
  <div id="zoom-wrap"></div>
</div>

<div id="backdrop"></div>

<div id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div id="sheet-title">game.name</div>
    <button id="sheet-close">×</button>
  </div>
  <div id="sheet-badge">discipline</div>
  <div id="sheet-desc">description goes here</div>
  <button id="sheet-play">play this →</button>
</div>

<div id="ui">
  <div id="branding">raft.house</div>
  <div id="hint">drag · tap · explore</div>
  <button id="legend-toggle">legend</button>
  <div id="legend">
    <div class="legend-title">disciplines</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ─── DATA ────────────────────────────────────────────────────────────────────

  const DISCIPLINES = {
    mathematics:          { color: 'rgba(245, 158, 11, 0.75)',  solid: '#f59e0b' },
    'computer science':   { color: 'rgba(59, 130, 246, 0.75)',  solid: '#3b82f6' },
    physics:              { color: 'rgba(99, 102, 241, 0.75)',  solid: '#6366f1' },
    biology:              { color: 'rgba(34, 197, 94, 0.75)',   solid: '#22c55e' },
    chemistry:            { color: 'rgba(168, 85, 247, 0.75)',  solid: '#a855f7' },
    economics:            { color: 'rgba(239, 68, 68, 0.75)',   solid: '#ef4444' },
    psychology:           { color: 'rgba(236, 72, 153, 0.75)',  solid: '#ec4899' },
    philosophy:           { color: 'rgba(139, 92, 246, 0.75)',  solid: '#8b5cf6' },
    music:                { color: 'rgba(249, 115, 22, 0.75)',  solid: '#f97316' },
    'visual arts':        { color: 'rgba(20, 184, 166, 0.75)',  solid: '#14b8a6' },
    writing:              { color: 'rgba(99, 102, 241, 0.75)',  solid: '#6366f1' },
  };

  const GAMES_RAW = [
    { name: 'fold.space',         discipline: 'mathematics',       desc: 'explore topological equivalence through spatial transforms' },
    { name: 'infinity.hotel',     discipline: 'mathematics',       desc: "manage hilbert's infinite hotel as impossible guests arrive" },
    { name: 'variable.engine',    discipline: 'mathematics',       desc: 'race to hit targets by tuning variables' },
    { name: 'race.condition',     discipline: 'computer science',  desc: 'experience race conditions as you modify shared data' },
    { name: 'type.tower',         discipline: 'computer science',  desc: 'build type-safe abstractions — one mismatch crashes the tower' },
    { name: 'state.craft',        discipline: 'computer science',  desc: 'craft a state machine together, one transition at a time' },
    { name: 'frame.shift',        discipline: 'physics',           desc: 'watch the same event from different reference frames' },
    { name: 'entropy.garden',     discipline: 'physics',           desc: 'try to un-scramble an egg — discover irreversibility' },
    { name: 'field.canvas',       discipline: 'physics',           desc: 'map invisible fields by placing charges' },
    { name: 'selection.pressure', discipline: 'biology',           desc: 'bid on traits in a changing environment' },
    { name: 'express.ion',        discipline: 'biology',           desc: 'become part of a gene expression pipeline' },
    { name: 'web.pulse',          discipline: 'biology',           desc: 'stress-test an ecosystem by removing species' },
    { name: 'bond.craft',         discipline: 'chemistry',         desc: 'trade electrons to form chemical bonds' },
    { name: 'equilibrium.dance',  discipline: 'chemistry',         desc: 'balance reactions in real time' },
    { name: 'reaction.path',      discipline: 'chemistry',         desc: 'navigate an energy landscape' },
    { name: 'margin.call',        discipline: 'economics',         desc: 'decide unit by unit — when does profit turn negative?' },
    { name: 'trade.winds',        discipline: 'economics',         desc: 'discover comparative advantage through trade' },
    { name: 'commons.game',       discipline: 'economics',         desc: 'share a resource pool where rationality leads to ruin' },
    { name: 'mirror.maze',        discipline: 'psychology',        desc: 'predict your own predictions — metacognition' },
    { name: 'anchor.drift',       discipline: 'psychology',        desc: 'watch anchoring bias hijack your estimates' },
    { name: 'story.self',         discipline: 'psychology',        desc: 'tell the same story three ways' },
    { name: 'ought.machine',      discipline: 'philosophy',        desc: 'feed arguments through an is/ought filter' },
    { name: 'circle.read',        discipline: 'philosophy',        desc: 'read the same passage as context shifts' },
    { name: 'lens.shift',         discipline: 'philosophy',        desc: 'view evidence through four epistemological lenses' },
    { name: 'tone.field',         discipline: 'music',             desc: 'map keys by feel — watch the circle of fifths emerge' },
    { name: 'voice.weave',        discipline: 'music',             desc: 'weave melodic lines into counterpoint' },
    { name: 'sound.color',        discipline: 'music',             desc: 'mix instrumental timbres like paint' },
    { name: 'space.between',      discipline: 'visual arts',       desc: "draw what isn't there — discover negative space" },
    { name: 'hue.shift',          discipline: 'visual arts',       desc: 'watch colors change by changing context' },
    { name: 'grid.break',         discipline: 'visual arts',       desc: 'master the grid, then break it on purpose' },
    { name: 'reader.ghost',       discipline: 'writing',           desc: 'write for a reader whose identity keeps shifting' },
    { name: 'draft.loop',         discipline: 'writing',           desc: 'rewrite under shifting constraints' },
    { name: 'genre.shift',        discipline: 'writing',           desc: 'translate one message into four genres' },
    { name: 'orbit.lab',          discipline: 'physics',           desc: 'explore orbital mechanics',           original: true },
    { name: 'proof.garden',       discipline: 'mathematics',       desc: 'grow mathematical proofs',            original: true },
    { name: 'signal.flow',        discipline: 'computer science',  desc: 'trace signals through networks',      original: true },
    { name: 'bias.lens',          discipline: 'psychology',        desc: 'examine cognitive biases',            original: true },
    { name: 'scale.shift',        discipline: 'philosophy',        desc: 'shift between scales of analysis',    original: true },
    { name: 'pattern.weave',      discipline: 'mathematics',       desc: 'discover hidden patterns',            original: true },
    { name: 'market.mind',        discipline: 'economics',         desc: 'simulate market psychology',          original: true },
    { name: 'rhythm.lab',         discipline: 'music',             desc: 'experiment with rhythm and time',     original: true },
    { name: 'code.weave',         discipline: 'computer science',  desc: 'weave code patterns',                 original: true },
    { name: 'time.prism',         discipline: 'physics',           desc: 'view events through time',            original: true },
    { name: 'liminal.pass',       discipline: 'philosophy',        desc: 'cross threshold moments',             original: true },
    { name: 'emerge.box',         discipline: 'biology',           desc: 'watch emergence from simple rules',   original: true },
  ];

  // ─── PHYSICS CONSTANTS ───────────────────────────────────────────────────────

  const DAMPING         = 0.88;
  const CENTER_FORCE    = 0.0018;
  const REPEL_FORCE     = 1.4;
  const ATTRACT_FORCE   = 0.008;
  const MAX_SPEED       = 6;
  const PERTURB_INTERVAL = 3000;

  let W = window.innerWidth;
  let H = window.innerHeight;

  let clusterCenters = {};

  function computeClusterCenters() {
    const disciplines = Object.keys(DISCIPLINES);
    const cols = 4;
    const rows = Math.ceil(disciplines.length / cols);
    const padX = W * 0.15;
    const padY = H * 0.12;
    const cellW = (W - padX * 2) / (cols - 1);
    const cellH = (H - padY * 2) / Math.max(1, rows - 1);
    disciplines.forEach(function (d, i) {
      const col = i % cols;
      const row = Math.floor(i / cols);
      clusterCenters[d] = {
        x: padX + col * cellW,
        y: padY + row * cellH,
      };
    });
  }

  // build particle list with spawn positions on edges
  const particles = GAMES_RAW.map(function (g, i) {
    const baseR = g.original ? 42 : 28;
    const r = baseR + Math.random() * 8;
    const spawnEdge = Math.random();
    let sx, sy;
    if (spawnEdge < 0.25)      { sx = -r * 2;     sy = Math.random() * H; }
    else if (spawnEdge < 0.5)  { sx = W + r * 2;  sy = Math.random() * H; }
    else if (spawnEdge < 0.75) { sx = Math.random() * W; sy = -r * 2; }
    else                       { sx = Math.random() * W; sy = H + r * 2; }
    return {
      id: i,
      game: g,
      r: r,
      x: sx,
      y: sy,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3,
      el: null,
      dragging: false,
    };
  });

  // ─── DOM SETUP ────────────────────────────────────────────────────────────────

  const zoomWrap = document.getElementById('zoom-wrap');

  function buildLegend() {
    const legend = document.getElementById('legend');
    Object.keys(DISCIPLINES).forEach(function (name) {
      const info = DISCIPLINES[name];
      const row = document.createElement('div');
      row.className = 'legend-row';

      const dot = document.createElement('div');
      dot.className = 'legend-dot';
      dot.style.background = info.solid;

      const lbl = document.createElement('div');
      lbl.className = 'legend-label';
      lbl.textContent = name;

      row.appendChild(dot);
      row.appendChild(lbl);
      legend.appendChild(row);
    });
  }

  function buildBubbles() {
    particles.forEach(function (p, i) {
      const disc = DISCIPLINES[p.game.discipline] || DISCIPLINES.mathematics;
      const el = document.createElement('div');
      el.className = 'bubble';
      el.style.width        = (p.r * 2) + 'px';
      el.style.height       = (p.r * 2) + 'px';
      el.style.left         = (p.x - p.r) + 'px';
      el.style.top          = (p.y - p.r) + 'px';
      el.style.background   = disc.color;
      el.style.boxShadow    = '0 0 ' + Math.round(p.r * 0.8) + 'px ' + disc.solid + '4d, inset 0 1px 0 rgba(255,255,255,0.15)';
      el.style.border       = '1px solid ' + disc.solid + '55';
      el.style.zIndex       = String(100 + i);
      el.style.opacity      = '0';

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = p.game.name;
      el.appendChild(label);

      // staggered spawn-in
      const delay = 80 + i * 33;
      setTimeout(function () {
        el.style.opacity = '1';
        el.classList.add('spawn-in');
        setTimeout(function () { el.classList.remove('spawn-in'); }, 700);
      }, delay);

      // staggered pulsing glow
      const glowDur = (2.5 + Math.random() * 2).toFixed(2) + 's';
      const glowDelay = (Math.random() * 2).toFixed(2) + 's';
      el.style.animation = 'bubble-glow ' + glowDur + ' ease-in-out ' + glowDelay + ' infinite';

      zoomWrap.appendChild(el);
      p.el = el;
    });
  }

  // ─── PHYSICS LOOP ─────────────────────────────────────────────────────────────

  let lastPerturb = 0;

  function tick(ts) {
    if (ts - lastPerturb > PERTURB_INTERVAL) {
      lastPerturb = ts;
      particles.forEach(function (p) {
        if (!p.dragging) {
          p.vx += (Math.random() - 0.5) * 0.6;
          p.vy += (Math.random() - 0.5) * 0.6;
        }
      });
    }

    const n = particles.length;

    for (let i = 0; i < n; i++) {
      const p = particles[i];
      if (p.dragging) continue;

      // center gravity
      p.vx += (W * 0.5 - p.x) * CENTER_FORCE;
      p.vy += (H * 0.5 - p.y) * CENTER_FORCE;

      // cluster attraction
      const cc = clusterCenters[p.game.discipline];
      if (cc) {
        p.vx += (cc.x - p.x) * ATTRACT_FORCE;
        p.vy += (cc.y - p.y) * ATTRACT_FORCE;
      }

      // pairwise repulsion
      for (let j = i + 1; j < n; j++) {
        const q = particles[j];
        const dx = p.x - q.x;
        const dy = p.y - q.y;
        const dist2 = dx * dx + dy * dy;
        const minDist = p.r + q.r + 4;

        if (dist2 < minDist * minDist) {
          const dist = Math.sqrt(dist2) || 0.001;
          const overlap = (minDist - dist) / dist;
          const fx = dx * overlap * REPEL_FORCE * 0.5;
          const fy = dy * overlap * REPEL_FORCE * 0.5;

          p.vx += fx;
          p.vy += fy;
          if (!q.dragging) {
            q.vx -= fx;
            q.vy -= fy;
          }
        }
      }

      // soft boundary bounce
      const margin = p.r + 2;
      if (p.x < margin)     p.vx += (margin - p.x) * 0.08;
      if (p.x > W - margin) p.vx += (W - margin - p.x) * 0.08;
      if (p.y < margin)     p.vy += (margin - p.y) * 0.08;
      if (p.y > H - margin) p.vy += (H - margin - p.y) * 0.08;

      // damping + speed clamp
      p.vx *= DAMPING;
      p.vy *= DAMPING;
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > MAX_SPEED) {
        p.vx = (p.vx / speed) * MAX_SPEED;
        p.vy = (p.vy / speed) * MAX_SPEED;
      }

      p.x += p.vx;
      p.y += p.vy;
    }

    // batch DOM writes
    for (let i = 0; i < n; i++) {
      const p = particles[i];
      if (!p.dragging) {
        p.el.style.left = (p.x - p.r) + 'px';
        p.el.style.top  = (p.y - p.r) + 'px';
      }
    }

    requestAnimationFrame(tick);
  }

  // ─── DRAG ─────────────────────────────────────────────────────────────────────

  let dragParticle = null;
  let dragOffX = 0, dragOffY = 0;
  let dragStartClientX = 0, dragStartClientY = 0;
  let didDrag = false;

  function getEventXY(e) {
    if (e.touches && e.touches.length > 0) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function screenToSim(cx, cy) {
    const rect = zoomWrap.getBoundingClientRect();
    const scaleX = rect.width / W;
    const scaleY = rect.height / H;
    return {
      x: (cx - rect.left) / scaleX,
      y: (cy - rect.top)  / scaleY,
    };
  }

  function onPointerDown(e, p) {
    e.stopPropagation();
    const pt = getEventXY(e);
    const sim = screenToSim(pt.x, pt.y);

    dragParticle     = p;
    dragOffX         = sim.x - p.x;
    dragOffY         = sim.y - p.y;
    dragStartClientX = pt.x;
    dragStartClientY = pt.y;
    didDrag          = false;

    p.dragging = true;
    p.el.classList.add('dragging');
    p.el.style.zIndex = '999';
  }

  function onPointerMove(e) {
    if (!dragParticle) return;
    e.preventDefault();
    const pt  = getEventXY(e);
    const sim = screenToSim(pt.x, pt.y);

    const dx = pt.x - dragStartClientX;
    const dy = pt.y - dragStartClientY;
    if (Math.sqrt(dx * dx + dy * dy) > 8) didDrag = true;

    dragParticle.x = sim.x - dragOffX;
    dragParticle.y = sim.y - dragOffY;
    dragParticle.el.style.left = (dragParticle.x - dragParticle.r) + 'px';
    dragParticle.el.style.top  = (dragParticle.y - dragParticle.r) + 'px';

    // carry velocity for momentum on release
    dragParticle.vx = (sim.x - dragOffX - dragParticle.x) * 0.3;
    dragParticle.vy = (sim.y - dragOffY - dragParticle.y) * 0.3;
  }

  function onPointerUp() {
    if (!dragParticle) return;
    const p = dragParticle;

    if (!didDrag) {
      openSheet(p);
      p.el.classList.add('highlighted', 'selected');
      setTimeout(function () { p.el.classList.remove('highlighted'); }, 500);
    }

    p.dragging = false;
    p.el.classList.remove('dragging');
    p.el.style.zIndex = String(100 + p.id);
    dragParticle = null;
  }

  function bindBubble(p) {
    p.el.addEventListener('mousedown', function (e) {
      e.preventDefault();
      onPointerDown(e, p);
    });
    p.el.addEventListener('touchstart', function (e) {
      e.preventDefault();
      onPointerDown(e, p);
    }, { passive: false });
  }

  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('mouseup', onPointerUp);
  document.addEventListener('touchmove', function (e) {
    if (dragParticle) { e.preventDefault(); onPointerMove(e); }
  }, { passive: false });
  document.addEventListener('touchend', onPointerUp);

  // ─── BOTTOM SHEET ─────────────────────────────────────────────────────────────

  let selectedParticle = null;

  function openSheet(p) {
    if (selectedParticle && selectedParticle !== p) {
      selectedParticle.el.classList.remove('selected');
    }
    selectedParticle = p;

    const disc = DISCIPLINES[p.game.discipline] || DISCIPLINES.mathematics;

    document.getElementById('sheet-title').textContent = p.game.name;
    document.getElementById('sheet-desc').textContent  = p.game.desc;

    const badge = document.getElementById('sheet-badge');
    badge.textContent    = p.game.discipline;
    badge.style.background = disc.color;
    badge.style.color    = 'white';

    document.getElementById('sheet').classList.add('open');
    document.getElementById('backdrop').classList.add('active');
  }

  function closeSheet() {
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('backdrop').classList.remove('active');
    if (selectedParticle) {
      selectedParticle.el.classList.remove('selected');
      selectedParticle = null;
    }
  }

  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  document.getElementById('backdrop').addEventListener('click', closeSheet);
  document.getElementById('sheet-play').addEventListener('click', function () {
    if (selectedParticle) {
      window.alert('launching ' + selectedParticle.game.name + ' — coming soon');
    }
  });

  // swipe-down to close sheet
  let sheetTouchStartY = 0;
  const sheetEl = document.getElementById('sheet');
  sheetEl.addEventListener('touchstart', function (e) {
    sheetTouchStartY = e.touches[0].clientY;
  }, { passive: true });
  sheetEl.addEventListener('touchmove', function (e) {
    if (e.touches[0].clientY - sheetTouchStartY > 60) closeSheet();
  }, { passive: true });

  // ─── LEGEND TOGGLE ────────────────────────────────────────────────────────────

  document.getElementById('legend-toggle').addEventListener('click', function () {
    document.getElementById('legend').classList.toggle('visible');
  });

  // ─── PINCH ZOOM ───────────────────────────────────────────────────────────────

  let zoom = 1;
  let pinchStartDist = 0;
  let pinchStartZoom = 1;

  function getPinchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  document.getElementById('scene').addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) {
      pinchStartDist = getPinchDist(e.touches);
      pinchStartZoom = zoom;
    }
  }, { passive: true });

  document.getElementById('scene').addEventListener('touchmove', function (e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = getPinchDist(e.touches);
      zoom = Math.min(1.5, Math.max(0.6, pinchStartZoom * (dist / pinchStartDist)));
      zoomWrap.style.transform = 'scale(' + zoom + ')';
    }
  }, { passive: false });

  // ─── HINT FADE ────────────────────────────────────────────────────────────────

  setTimeout(function () {
    document.getElementById('hint').classList.add('hidden');
  }, 3000);

  // ─── RESIZE ───────────────────────────────────────────────────────────────────

  window.addEventListener('resize', function () {
    W = window.innerWidth;
    H = window.innerHeight;
    computeClusterCenters();
  });

  // ─── INIT ─────────────────────────────────────────────────────────────────────

  computeClusterCenters();
  buildLegend();
  buildBubbles();

  // bind events after elements exist
  setTimeout(function () {
    particles.forEach(function (p) { bindBubble(p); });
  }, 10);

  requestAnimationFrame(tick);

}());
</script>
</body>
</html>
