  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep: #0f2a2e;
      --teal: #0d4f4f;
      --cyan: #17858a;
      --foam: #7dd3d8;
      --sand: #f0e6d3;
      --sand-light: #faf6ee;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--deep);
      touch-action: none;
    }

    #ocean {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #0d5b7a 0%, #0a3d5c 40%, #071e2e 100%);
      overflow: hidden;
    }

    .wave {
      position: absolute;
      width: 200%; height: 200%;
      border-radius: 43%;
      opacity: 0.07;
      background: radial-gradient(ellipse, var(--foam) 0%, transparent 70%);
    }
    .wave-1 { top: -60%; left: -30%; animation: spin1 22s linear infinite; }
    .wave-2 { top: -50%; left: -10%; animation: spin2 31s linear infinite; opacity: 0.04; }
    .wave-3 { top: -70%; left: -50%; animation: spin3 18s linear infinite; opacity: 0.05; }

    @keyframes spin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spin2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes spin3 { from { transform: rotate(20deg); } to { transform: rotate(380deg); } }

    .sparkle {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--foam);
      opacity: 0;
      animation: twinkle var(--d, 4s) ease-in-out var(--delay, 0s) infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.6; transform: scale(1.5); }
    }

    #fog {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background: radial-gradient(ellipse at 50% 50%,
        transparent 40%,
        rgba(10,25,35,0.25) 65%,
        rgba(7,18,26,0.7) 100%
      );
    }

    #world-wrap {
      position: fixed; inset: 0;
      cursor: grab;
      user-select: none;
    }
    #world-wrap.dragging { cursor: grabbing; }

    #world {
      position: absolute;
      width: 2000px; height: 1500px;
      transform-origin: 0 0;
      will-change: transform;
    }

    .island {
      position: absolute;
      cursor: pointer;
      transform-origin: center center;
    }

    .island-body {
      position: relative;
      transition: filter 0.3s ease, transform 0.3s ease;
    }
    .island:hover .island-body { filter: brightness(1.15); transform: scale(1.03); }
    .island.selected .island-body { filter: brightness(1.2); }

    .island-svg { display: block; filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5)); }

    .island-label {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      bottom: -28px;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--sand);
      text-shadow: 0 1px 6px rgba(0,0,0,0.8), 0 0 12px rgba(0,0,0,0.6);
      pointer-events: none;
      opacity: 0.9;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    .island { animation: bob var(--bob-dur, 4s) ease-in-out var(--bob-delay, 0s) infinite; }

    .marker {
      position: absolute;
      cursor: pointer;
      z-index: 5;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .marker-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--sand-light);
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 8px rgba(255,255,255,0.3), 0 2px 6px rgba(0,0,0,0.5);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .marker:hover .marker-dot {
      transform: scale(1.5);
      box-shadow: 0 0 14px rgba(125,211,216,0.8), 0 2px 8px rgba(0,0,0,0.4);
      background: var(--foam);
    }

    .marker-label {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      top: -22px;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--sand);
      white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .island.selected .marker-label,
    .show-labels .marker-label { opacity: 1; }
    .island.selected .marker-dot { width: 13px; height: 13px; }

    #detail-card {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: linear-gradient(180deg, rgba(13,44,50,0.97) 0%, rgba(10,30,38,0.99) 100%);
      border-top: 1px solid rgba(125,211,216,0.2);
      border-radius: 20px 20px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 0);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
      max-height: 45vh;
      backdrop-filter: blur(20px);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    }
    #detail-card.open { transform: translateY(0); }

    .card-handle {
      width: 36px; height: 4px;
      background: rgba(125,211,216,0.3);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .card-inner { padding: 16px 24px 24px; }

    .card-discipline {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--foam);
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    .card-game-name {
      font-size: 22px;
      font-weight: 600;
      color: var(--sand-light);
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .card-description {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(240,230,211,0.7);
      margin-bottom: 20px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--teal) 100%);
      border: none;
      border-radius: 100px;
      color: var(--sand-light);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 4px 16px rgba(23,133,138,0.4);
    }
    .btn-launch:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(23,133,138,0.6);
      filter: brightness(1.1);
    }
    .btn-launch:active { transform: translateY(0); }

    .btn-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(125,211,216,0.2);
      background: rgba(125,211,216,0.08);
      color: var(--foam);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease;
      margin-left: auto;
    }
    .btn-close:hover { background: rgba(125,211,216,0.15); }

    #compass {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 20;
      opacity: 0.6;
      pointer-events: none;
    }

    #logo {
      position: fixed;
      top: 20px; left: 24px;
      z-index: 20;
      color: var(--foam);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      opacity: 0.8;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    #hint {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 20;
      font-size: 11px;
      color: var(--foam);
      opacity: 0;
      letter-spacing: 0.06em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
      transition: opacity 1s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    #hint.visible { opacity: 0.5; }

    #zoom-controls {
      position: fixed;
      top: 20px; right: 24px;
      z-index: 20;
      display: flex;
      gap: 6px;
    }
    .zoom-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(125,211,216,0.2);
      background: rgba(13,44,50,0.7);
      color: var(--foam);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: background 0.2s ease;
      font-weight: 300;
    }
    .zoom-btn:hover { background: rgba(23,133,138,0.3); }
  </style>
</head>

    Object.keys(attrs).forEach(function(k) { el.setAttribute(k, attrs[k]); });
  }
  return el;
}

function buildIslandSVG(island, blobPath, idx) {
  var s = island.size;
  var vb = 130;
  var h = s * 0.82;
  var vh = vb * 0.82;

  var svg = svgEl('svg', {
    width: s, height: h,
    viewBox: '0 0 ' + vb + ' ' + vh,
    class: 'island-svg'
  });

  var defs = svgEl('defs');

  // island gradient
  var igGrad = svgEl('radialGradient', { id: 'ig-' + idx, cx: '45%', cy: '40%', r: '60%' });
  var s1 = svgEl('stop', { offset: '0%', 'stop-color': island.peak });
  var s2 = svgEl('stop', { offset: '100%', 'stop-color': island.fill });
  igGrad.appendChild(s1); igGrad.appendChild(s2);

  // sand gradient
  var sgGrad = svgEl('radialGradient', { id: 'sg-' + idx, cx: '50%', cy: '70%', r: '50%' });
  var s3 = svgEl('stop', { offset: '0%', 'stop-color': island.sand, 'stop-opacity': '0.8' });
  var s4 = svgEl('stop', { offset: '100%', 'stop-color': island.sand, 'stop-opacity': '0' });
  sgGrad.appendChild(s3); sgGrad.appendChild(s4);

  // drop shadow filter
  var filter = svgEl('filter', { id: 'sf-' + idx });
  var shadow = svgEl('feDropShadow', { dx: '0', dy: '4', stdDeviation: '6', 'flood-color': 'rgba(0,0,0,0.5)' });
  filter.appendChild(shadow);

  defs.appendChild(igGrad); defs.appendChild(sgGrad); defs.appendChild(filter);
  svg.appendChild(defs);

  // island body
  var body = svgEl('path', { d: blobPath, fill: 'url(#ig-' + idx + ')', filter: 'url(#sf-' + idx + ')' });
  // shore highlight
  var shore = svgEl('path', { d: blobPath, fill: 'url(#sg-' + idx + ')', opacity: '0.4' });

  // trees
  var t1x = vb * 0.42, t1y1 = vb * 0.36, t1y2 = vb * 0.52;
  var trunk1 = svgEl('line', { x1: t1x, y1: t1y1, x2: t1x, y2: t1y2, stroke: island.trunk, 'stroke-width': '2.5' });
  var leaf1 = svgEl('circle', { cx: t1x, cy: vb * 0.32, r: vb * 0.08, fill: island.foliage, opacity: '0.9' });

  var t2x = vb * 0.60;
  var trunk2 = svgEl('line', { x1: t2x, y1: vb * 0.42, x2: t2x, y2: vb * 0.56, stroke: island.trunk, 'stroke-width': '2' });
  var leaf2 = svgEl('circle', { cx: t2x, cy: vb * 0.38, r: vb * 0.065, fill: island.foliage, opacity: '0.85' });

  var t3x = vb * 0.30;
  var trunk3 = svgEl('line', { x1: t3x, y1: vb * 0.46, x2: t3x, y2: vb * 0.56, stroke: island.trunk, 'stroke-width': '1.5' });
  var leaf3 = svgEl('circle', { cx: t3x, cy: vb * 0.43, r: vb * 0.05, fill: island.foliage, opacity: '0.8' });

  // water shimmer
  var shimmer = svgEl('ellipse', { cx: vb * 0.50, cy: vh * 0.95, rx: vb * 0.38, ry: vb * 0.06, fill: 'rgba(125,211,216,0.15)' });

  [body, shore, trunk1, leaf1, trunk2, leaf2, trunk3, leaf3, shimmer].forEach(function(n) { svg.appendChild(n); });
  return svg;
}

// ── build world ───────────────────────────────────────────────────────────────
var worldEl = document.getElementById('world');

ISLANDS.forEach(function(island, idx) {
  var el = document.createElement('div');
  el.className = 'island ' + island.theme;
  el.id = 'island-' + island.id;
  el.style.left = island.x + 'px';
  el.style.top = island.y + 'px';
  el.style.setProperty('--bob-dur', island.bobDur);
  el.style.setProperty('--bob-delay', island.bobDelay);

  var body = document.createElement('div');
  body.className = 'island-body';

  var svg = buildIslandSVG(island, BLOBS[idx], idx);
  body.appendChild(svg);

  var label = document.createElement('div');
  label.className = 'island-label';
  label.textContent = island.name;
  body.appendChild(label);

  island.games.forEach(function(game) {
    var markerEl = document.createElement('div');
    markerEl.className = 'marker';
    markerEl.dataset.islandId = island.id;
    markerEl.dataset.gameId = game.id;

    var dotX = game.cx * island.size;
    var dotY = game.cy * (island.size * 0.82);
    markerEl.style.left = (dotX - 5) + 'px';
    markerEl.style.top = (dotY - 5) + 'px';

    var lbl = document.createElement('div');
    lbl.className = 'marker-label';
    lbl.textContent = game.name;

    var dot = document.createElement('div');
    dot.className = 'marker-dot';

    markerEl.appendChild(lbl);
    markerEl.appendChild(dot);
    body.appendChild(markerEl);

    markerEl.addEventListener('click', function(e) {
      e.stopPropagation();
      openGameCard(island, game);
    });
  });

  el.appendChild(body);

  el.addEventListener('click', function(e) {
    e.stopPropagation();
    if (selectedIsland === island.id) {
      deselectIsland();
    } else {
      selectIsland(island);
    }
  });

  worldEl.appendChild(el);
});

// ── sparkles ──────────────────────────────────────────────────────────────────
(function() {
  var ocean = document.getElementById('ocean');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = (Math.random() * 100) + '%';
    s.style.setProperty('--d', (3 + Math.random() * 5) + 's');
    s.style.setProperty('--delay', (Math.random() * 6) + 's');
    ocean.appendChild(s);
  }
})();

// ── pan / zoom state ──────────────────────────────────────────────────────────
var worldWrap = document.getElementById('world-wrap');
var detailCard = document.getElementById('detail-card');
var viewX = 0, viewY = 0, viewScale = 1;
var selectedIsland = null;
var openMarker = null;

function initView() {
  var vw = window.innerWidth, vh = window.innerHeight;
  viewScale = Math.min(vw / 2000, vh / 1500) * 1.1;
  viewX = (vw - 2000 * viewScale) / 2;
  viewY = (vh - 1500 * viewScale) / 2;
  applyTransform();
}

function applyTransform() {
  worldEl.style.transform = 'translate(' + viewX + 'px,' + viewY + 'px) scale(' + viewScale + ')';
  if (viewScale > 0.9) {
    worldEl.classList.add('show-labels');
  } else {
    worldEl.classList.remove('show-labels');
  }
}

function clampView() {
  var vw = window.innerWidth, vh = window.innerHeight;
  var pad = 60;
  viewX = Math.min(pad, Math.max(vw - 2000 * viewScale - pad, viewX));
  viewY = Math.min(pad, Math.max(vh - 1500 * viewScale - pad, viewY));
}

function animateTransform() {
  worldEl.style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.2,1)';
  applyTransform();
  setTimeout(function() { worldEl.style.transition = ''; }, 550);
}

// ── island selection ──────────────────────────────────────────────────────────
function selectIsland(island) {
  if (selectedIsland) {
    var prev = document.getElementById('island-' + selectedIsland);
    if (prev) prev.classList.remove('selected');
  }
  selectedIsland = island.id;
  var el = document.getElementById('island-' + island.id);
  el.classList.add('selected');

  var vw = window.innerWidth, vh = window.innerHeight;
  var targetScale = Math.min(1.4, viewScale * 1.5);
  viewScale = Math.min(2, Math.max(0.5, targetScale));
  var cx = island.x + island.size / 2;
  var cy = island.y + island.size * 0.41;
  viewX = vw / 2 - cx * viewScale;
  viewY = vh / 2 - cy * viewScale;
  clampView();
  animateTransform();
}

function deselectIsland() {
  if (selectedIsland) {
    var el = document.getElementById('island-' + selectedIsland);
    if (el) el.classList.remove('selected');
    selectedIsland = null;
  }
  closeCard();
}

// ── detail card ───────────────────────────────────────────────────────────────
function openGameCard(island, game) {
  document.getElementById('card-discipline').textContent = island.name;
  document.getElementById('card-game-name').textContent = game.name;
  document.getElementById('card-description').textContent = game.desc;
  detailCard.classList.add('open');
  openMarker = { island: island, game: game };
}

function closeCard() {
  detailCard.classList.remove('open');
  openMarker = null;
}

document.getElementById('card-close').addEventListener('click', closeCard);

document.getElementById('card-launch').addEventListener('click', function() {
  if (openMarker) {
    window.alert('launching ' + openMarker.game.name + '\u2026\n\n(this would navigate to the game)');
  }
});

// tap ocean = deselect
worldWrap.addEventListener('click', function() {
  deselectIsland();
});

// ── mouse pan ─────────────────────────────────────────────────────────────────
var isDragging = false, didDrag = false;
var dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

worldWrap.addEventListener('mousedown', function(e) {
  isDragging = true; didDrag = false;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = viewX; panStartY = viewY;
  worldWrap.classList.add('dragging');
  worldEl.style.transition = '';
});

window.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  var dx = e.clientX - dragStartX;
  var dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
  viewX = panStartX + dx;
  viewY = panStartY + dy;
  clampView();
  applyTransform();
});

window.addEventListener('mouseup', function() {
  isDragging = false;
  worldWrap.classList.remove('dragging');
});

// ── scroll zoom ───────────────────────────────────────────────────────────────
worldWrap.addEventListener('wheel', function(e) {
  e.preventDefault();
  var delta = -e.deltaY * 0.001;
  var newScale = Math.min(2, Math.max(0.5, viewScale * (1 + delta)));
  var mx = e.clientX, my = e.clientY;
  viewX = mx - (mx - viewX) * (newScale / viewScale);
  viewY = my - (my - viewY) * (newScale / viewScale);
  viewScale = newScale;
  clampView();
  applyTransform();
}, { passive: false });

// ── touch pan + pinch ─────────────────────────────────────────────────────────
var lastTouchDist = null;
var touchPanStartX = 0, touchPanStartY = 0, touchViewStartX = 0, touchViewStartY = 0;

worldWrap.addEventListener('touchstart', function(e) {
  e.preventDefault();
  worldEl.style.transition = '';
  if (e.touches.length === 1) {
    touchPanStartX = e.touches[0].clientX;
    touchPanStartY = e.touches[0].clientY;
    touchViewStartX = viewX;
    touchViewStartY = viewY;
    didDrag = false;
    lastTouchDist = null;
  } else if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: false });

worldWrap.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 1 && lastTouchDist === null) {
    var dx = e.touches[0].clientX - touchPanStartX;
    var dy = e.touches[0].clientY - touchPanStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    viewX = touchViewStartX + dx;
    viewY = touchViewStartY + dy;
    clampView();
    applyTransform();
  } else if (e.touches.length === 2) {
    var ddx = e.touches[0].clientX - e.touches[1].clientX;
    var ddy = e.touches[0].clientY - e.touches[1].clientY;
    var dist = Math.sqrt(ddx*ddx + ddy*ddy);
    if (lastTouchDist) {
      var scale = dist / lastTouchDist;
      var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      var newScale = Math.min(2, Math.max(0.5, viewScale * scale));
      viewX = midX - (midX - viewX) * (newScale / viewScale);
      viewY = midY - (midY - viewY) * (newScale / viewScale);
      viewScale = newScale;
      clampView();
      applyTransform();
    }
    lastTouchDist = dist;
  }
}, { passive: false });

// ── zoom buttons ──────────────────────────────────────────────────────────────
document.getElementById('zoom-in').addEventListener('click', function() {
  var vw = window.innerWidth, vh = window.innerHeight;
  var newScale = Math.min(2, viewScale * 1.25);
  viewX = vw/2 - (vw/2 - viewX) * (newScale / viewScale);
  viewY = vh/2 - (vh/2 - viewY) * (newScale / viewScale);
  viewScale = newScale;
  clampView();
  animateTransform();
});

document.getElementById('zoom-out').addEventListener('click', function() {
  var vw = window.innerWidth, vh = window.innerHeight;
  var newScale = Math.max(0.5, viewScale * 0.8);
  viewX = vw/2 - (vw/2 - viewX) * (newScale / viewScale);
  viewY = vh/2 - (vh/2 - viewY) * (newScale / viewScale);
  viewScale = newScale;
  clampView();
  animateTransform();
});

// ── hint ──────────────────────────────────────────────────────────────────────
setTimeout(function() {
  var hint = document.getElementById('hint');
  hint.classList.add('visible');
  setTimeout(function() { hint.classList.remove('visible'); }, 4000);
}, 1200);

// ── init ──────────────────────────────────────────────────────────────────────
initView();
window.addEventListener('resize', initView);
</script>
