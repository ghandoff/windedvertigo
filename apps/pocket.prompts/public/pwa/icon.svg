<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#111111"/>
  <g transform="translate(256,220)">
    <!-- microphone body -->
    <rect x="-40" y="-90" width="80" height="160" rx="40" fill="none" stroke="#4a9eff" stroke-width="12"/>
    <!-- mic stand arc -->
    <path d="M-70,50 a70,70 0 0,0 140,0" fill="none" stroke="#4a9eff" stroke-width="12" stroke-linecap="round"/>
    <!-- mic stand stem -->
    <line x1="0" y1="120" x2="0" y2="160" stroke="#4a9eff" stroke-width="12" stroke-linecap="round"/>
    <!-- base -->
    <line x1="-35" y1="160" x2="35" y2="160" stroke="#4a9eff" stroke-width="12" stroke-linecap="round"/>
  </g>
  <!-- sound waves -->
  <g transform="translate(256,180)" fill="none" stroke="#4a9eff" stroke-linecap="round" opacity="0.5">
    <path d="M80,-50 a100,100 0 0,1 0,100" stroke-width="8"/>
    <path d="M-80,-50 a100,100 0 0,0 0,100" stroke-width="8"/>
  </g>
  <!-- label -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="42" font-weight="600" fill="#666">pocket.prompts</text>
</svg>
